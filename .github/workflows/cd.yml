name: CD

# This workflow builds Docker images and (optionally) deploys to AWS ECS.
# AWS deployment steps are commented out. To enable deployment:
#   1. Add the following secrets to your GitHub repository:
#      - AWS_ACCESS_KEY_ID
#      - AWS_SECRET_ACCESS_KEY
#      - AWS_ACCOUNT_ID
#   2. Uncomment all sections marked with "# [AWS]"
#   3. Update AWS_REGION, ECR image names, ECS cluster/service names as needed.

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  API_IMAGE: saas-api
  WORKER_IMAGE: saas-worker
  # [AWS] Set your AWS region here and uncomment the line below:
  # AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    name: Build Docker Images
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # [AWS] Uncomment to configure AWS credentials:
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_REGION }}

      # [AWS] Uncomment to log in to Amazon ECR:
      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Build API Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $API_IMAGE:$IMAGE_TAG \
            -t $API_IMAGE:latest \
            -f apps/api/Dockerfile .

      # [AWS] Uncomment to push the API image to ECR (run after login-ecr step above):
